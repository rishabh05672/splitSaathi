name: split_saathi
description: "SplitSaathi — Real-time shared expense tracker for groups"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.1
  flutter_animate: ^4.5.2

  # State Management
  provider: ^6.1.4

  # Navigation
  go_router: ^14.8.1

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.7
  firebase_storage: ^12.4.5
  firebase_messaging: ^15.2.5
  cloud_functions: ^5.3.5

  # Auth
  google_sign_in: ^6.2.2

  # Local Storage
  shared_preferences: ^2.5.3

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  image_picker: ^1.1.2
  share_plus: ^10.1.4
  flutter_local_notifications: ^18.0.1
  http: ^1.6.0
  googleapis_auth: ^2.3.0
  permission_handler: 11.3.1
  fl_chart: 0.70.2
  syncfusion_flutter_charts: 28.2.3
  curved_navigation_bar: 1.0.6
  flutter_dotenv: ^5.2.1
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/animations/
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21 # android min sdk min:16, default:21
